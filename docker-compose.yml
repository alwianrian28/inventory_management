services:
  mysql:
    image: mysql:8.0
    container_name: inventory_mysql
    restart: unless-stopped
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-inventory_root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-inventory_management}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/inventory_management.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-inventory_root}"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 40s

volumes:
  mysql_data:
